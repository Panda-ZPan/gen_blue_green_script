apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: '{"apiVersion":"networking.k8s.io/v1","kind":"Ingress","metadata":{"annotations":{},"labels":{"app.name":"album-saas-story"},"name":"str-exts","namespace":"prod"},"spec":{"ingressClassName":"apisix","rules":[{"host":"album-njs.yun.139.com","http":{"paths":[{"backend":{"service":{"name":"album-saas-story-svc","port":{"number":8194}}},"path":"/album/story","pathType":"Prefix"}]}}],"tls":[{"hosts":["album-njs.yun.139.com"],"secretName":"tls-secret"}]}}

      '
    k8s.apisix.apache.org/enable: 'true'
    k8s.apisix.apache.org/priority: '5'
    k8s.apisix.apache.org/set-headers: '{"baggage": "meshEnv=album-blue"}'
