apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: '96'
  labels:
    app.name: personal-dynamic-service-plus
  name: personal-dynamic-service-plus-green
  namespace: test
spec:
  progressDeadlineSeconds: 600
  replicas: 0
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.name: personal-dynamic-service-plus
      sidecar.mesh.io/lane: pdynamic-green
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app.name: personal-dynamic-service-plus
        app: personal-dynamic-service-plus
        sidecar.mesh.io/data-plane-mode: java_lite
        sidecar.mesh.io/lane: pdynamic-green
        sidecar.mesh.io/mse-namespace: cloud-test-default-group
    spec:
      containers:
      - env:
        - name: ACTIVE_PROFILE
          value: test
        - name: NACOS_SUFFIX
          value: .green
        envFrom:
        - secretRef:
            name: personal-dynamic-secret
        - configMapRef:
            name: mse-publish-gray
        image: d133ypcgtest01-c138372f.ecis.guangzhou-2.cmecloud.cn/k8s/personal-dynamic-service-plus:${imageversion}
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 10
          httpGet:
            path: /actuator/health/liveness
            port: 8089
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: personal-dynamic-service-plus
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /actuator/health/liveness
            port: 8089
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '1'
            memory: 10Gi
          requests:
            cpu: 100m
            memory: 1Gi
        startupProbe:
          failureThreshold: 50
          httpGet:
            path: /actuator/health/liveness
            port: 8089
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /logs
          name: logs
        - mountPath: /etc/localtime
          name: time-localtime
          readOnly: true
      dnsConfig:
        options:
        - name: single-request-reopen
        - name: timeout
          value: '1'
        - name: attempts
          value: '3'
        - name: ndots
          value: '2'
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: paas-d133ypcgtest01-harbor-secret
      nodeSelector:
        normal: 'true'
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 60
      volumes:
      - hostPath:
          path: /var/lib/docker/logs
          type: DirectoryOrCreate
        name: logs
      - hostPath:
          path: /etc/localtime
          type: ''
        name: time-localtime
